<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <title>Popular Destinations - Weather Planner</title>
    <script src="https://unpkg.com/vue@3"></script>
    <script defer src="destinations.js"></script>
    <link rel="stylesheet" href="style.css">
  </head>
  <body>
    <div id="app">
      <header class="banner">
        <img src="assets/sun.png" alt="Sun icon" class="logo">
        <h1>Popular Destinations</h1>
      </header>

      <section class="destinations-grid">
        <div
          class="city-card"
          v-for="city in cities"
          :key="city.name"
          @click="getCityWeather(city.name)">
          <h3>{{ city.name }}</h3>
          <img :src="city.image" :alt="city.name" class="city-img">
        </div>
      </section>

      <section v-if="weather" class="destination-weather">
        <h2>Weather in {{ weather.city }}, {{ weather.country }}</h2>
        <p><strong>Advice:</strong> {{ weather.packingAdvice }}</p>
        <p><strong>Air Quality:</strong> {{ weather.airQuality.category }}</p>
        <p>{{ weather.airQuality.warning }}</p>
        <button @click="backToList">Back to Destinations</button>
      </section>
    </div>
  </body>
</html>
